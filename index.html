<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gem Hunter 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      align-items: center;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px;
      padding: 10px 28px;
      color: #fff;
      z-index: 10;
      pointer-events: none;
    }
    #hud .stat { display: flex; flex-direction: column; align-items: center; }
    #hud .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
    #hud .value { font-size: 22px; font-weight: 700; }
    #hud .divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }

    /* ── Crosshair ── */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    /* ── Click-to-play / pause overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    #overlay h2 { font-size: 42px; margin-bottom: 12px; }
    #overlay p  { font-size: 16px; opacity: 0.65; margin-bottom: 8px; }
    #overlay .key-grid {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 6px 24px;
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.7;
    }
    #overlay .key-grid span { display: flex; align-items: center; gap: 8px; }
    #overlay .key {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-family: monospace;
    }
    #overlay .cta {
      margin-top: 36px;
      padding: 14px 44px;
      border-radius: 40px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── Win screen ── */
    #win-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    #win-screen h1 { font-size: 64px; margin-bottom: 12px; }
    #win-screen p  { font-size: 20px; opacity: 0.7; margin-bottom: 32px; }
    #win-screen button {
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 40px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #win-screen button:hover { opacity: 0.85; }

    /* ── Gem nearby pulse ── */
    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
    }
    #nearby-pulse {
      position: fixed;
      top: 50%; left: 50%;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #fff;
      pointer-events: none;
      z-index: 11;
      display: none;
    }
    #nearby-pulse.active {
      display: block;
      animation: pulse-ring 0.6s ease-out forwards;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="stat">
    <span class="label">Gems</span>
    <span class="value" id="gem-count">0 / 20</span>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <span class="label">Time</span>
    <span class="value" id="timer">0:00</span>
  </div>
</div>

<div id="crosshair"></div>
<div id="nearby-pulse"></div>

<div id="overlay">
  <h2>Gem Hunter 3D</h2>
  <p>Explore the world and collect all 20 gems!</p>
  <div class="key-grid">
    <span><span class="key">W A S D</span> or <span class="key">↑ ← ↓ →</span> Move</span>
    <span><span class="key">Mouse</span> Look around</span>
    <span><span class="key">Shift</span> Sprint</span>
    <span><span class="key">Esc</span> Pause</span>
  </div>
  <div class="cta" id="overlay-cta">Click to Play</div>
</div>

<div id="win-screen">
  <h1>You Win!</h1>
  <p id="win-msg">All gems collected!</p>
  <button onclick="location.reload()">Play Again</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 160);

// ─── Camera (first-person) ───────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 400);
camera.rotation.order = 'YXZ'; // yaw then pitch — critical for FPS feel

// ─── Lighting ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, 0.7));

const sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
sun.position.set(60, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -120;
sun.shadow.camera.right = sun.shadow.camera.top   =  120;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xaaddff, 0.4);
fill.position.set(-40, 20, -40);
scene.add(fill);

// ─── Terrain ─────────────────────────────────────────────────────────────────
const GRID = 120;
const terrainGeo = new THREE.PlaneGeometry(GRID, GRID, 80, 80);
terrainGeo.rotateX(-Math.PI / 2);

const pos = terrainGeo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  pos.setY(i, terrainHeight(pos.getX(i), pos.getZ(i)));
}
terrainGeo.computeVertexNormals();

const terrain = new THREE.Mesh(
  terrainGeo,
  new THREE.MeshLambertMaterial({ color: 0x4caf50 })
);
terrain.receiveShadow = true;
scene.add(terrain);

function terrainHeight(x, z) {
  return Math.sin(x * 0.12) * 3.5
       + Math.cos(z * 0.09) * 4
       + Math.sin(x * 0.22 + z * 0.18) * 2.5
       + Math.cos(x * 0.07 - z * 0.14) * 3;
}

// ─── Water ───────────────────────────────────────────────────────────────────
const waterGeo = new THREE.PlaneGeometry(GRID, GRID);
waterGeo.rotateX(-Math.PI / 2);
const waterMesh = new THREE.Mesh(
  waterGeo,
  new THREE.MeshLambertMaterial({ color: 0x1e88e5, transparent: true, opacity: 0.75 })
);
waterMesh.position.y = -1.5;
scene.add(waterMesh);

// ─── Trees ───────────────────────────────────────────────────────────────────
const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });
const leafPalette = [0x2e7d32, 0x388e3c, 0x43a047, 0x1b5e20, 0x33691e];

function plantTree(x, z) {
  const y = terrainHeight(x, z);
  if (y < -0.5) return;

  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 2.5, 6), trunkMat);
  trunk.position.set(x, y + 1.25, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const canopy = new THREE.Mesh(
    new THREE.ConeGeometry(2.2 + Math.random() * 0.8, 4.5 + Math.random() * 2, 6),
    new THREE.MeshLambertMaterial({ color: leafPalette[Math.floor(Math.random() * leafPalette.length)] })
  );
  canopy.position.set(x, y + 5, z);
  canopy.castShadow = true;
  scene.add(canopy);
}

for (let i = 0; i < 90; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 10 + Math.random() * 48;
  plantTree(Math.cos(a) * r, Math.sin(a) * r);
}

// ─── Clouds ──────────────────────────────────────────────────────────────────
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
const clouds = [];
for (let i = 0; i < 14; i++) {
  const g = new THREE.Group();
  for (let j = 0; j < 5; j++) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random() * 2, 7, 7), cloudMat);
    s.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*2, (Math.random()-0.5)*4);
    g.add(s);
  }
  const a = Math.random() * Math.PI * 2, r = 15 + Math.random() * 60;
  g.position.set(Math.cos(a)*r, 40 + Math.random()*20, Math.sin(a)*r);
  scene.add(g);
  clouds.push(g);
}

// ─── Gems ────────────────────────────────────────────────────────────────────
const GEM_COUNT  = 20;
const gemColors  = [0xff4081, 0x7c4dff, 0x00e5ff, 0xffea00, 0x69f0ae, 0xff6d00];
const gemMeshes  = [];
const octGeo     = new THREE.OctahedronGeometry(0.85, 0);

for (let i = 0; i < GEM_COUNT; i++) {
  const a = (i / GEM_COUNT) * Math.PI * 2 + Math.random() * 0.5;
  const r = 8 + Math.random() * 44;
  const x = Math.cos(a) * r;
  const z = Math.sin(a) * r;
  const y = terrainHeight(x, z) + 2 + Math.random() * 3;

  const color = gemColors[i % gemColors.length];
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.4, metalness: 0.2, roughness: 0.1,
  });
  const mesh = new THREE.Mesh(octGeo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.userData = { baseY: y, phase: Math.random() * Math.PI * 2, collected: false };
  scene.add(mesh);
  gemMeshes.push(mesh);

  const light = new THREE.PointLight(color, 1.8, 10);
  light.position.set(x, y, z);
  scene.add(light);
  mesh.userData.light = light;
}

// ─── Player state ─────────────────────────────────────────────────────────────
const EYE_HEIGHT = 1.75;
const MOVE_SPEED = 9;
const SPRINT_MULT = 2.0;
const COLLECT_DIST = 3.0;
const BOUNDS = 57;

const player = { x: 0, z: 0, yaw: 0, pitch: 0 };

// Start on high ground (terrain is ~7 units high at 0,0)
player.x = 0; player.z = 0;

// ─── Keyboard state ──────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── Pointer lock ────────────────────────────────────────────────────────────
let locked = false;
const overlay    = document.getElementById('overlay');
const crosshair  = document.getElementById('crosshair');
const overlayCta = document.getElementById('overlay-cta');

overlay.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  overlay.style.display   = locked ? 'none' : 'flex';
  crosshair.style.display = locked ? 'block' : 'none';
  overlayCta.textContent  = 'Click to Resume';
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  player.yaw   -= e.movementX * 0.0022;
  player.pitch  = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, player.pitch - e.movementY * 0.0022));
});

// ─── Game state ──────────────────────────────────────────────────────────────
let collected = 0;
let startTime = null;
let gameWon   = false;

function collectGem(gem) {
  if (gem.userData.collected) return;
  gem.userData.collected = true;
  collected++;
  gem.userData.light.intensity = 0;

  // Pop-and-fade burst
  gem.material = gem.material.clone();
  gem.material.transparent = true;
  let scale = 1;
  const burst = setInterval(() => {
    scale += 0.2;
    gem.scale.setScalar(scale);
    gem.material.opacity = Math.max(0, gem.material.opacity - 0.14);
    if (scale > 3) { clearInterval(burst); gem.visible = false; }
  }, 16);

  // Pulse the crosshair ring
  const pulse = document.getElementById('nearby-pulse');
  pulse.className = '';
  void pulse.offsetWidth;
  pulse.style.borderColor = '#' + gem.userData.light.color.getHexString();
  pulse.className = 'active';

  document.getElementById('gem-count').textContent = `${collected} / ${GEM_COUNT}`;

  if (collected === GEM_COUNT) {
    gameWon = true;
    document.exitPointerLock();
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('win-msg').textContent =
      `All ${GEM_COUNT} gems collected in ${m}:${s.toString().padStart(2,'0')}!`;
    document.getElementById('win-screen').style.display = 'flex';
  }
}

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Game loop ───────────────────────────────────────────────────────────────
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;
  const t   = now * 0.001;

  // Drift clouds
  clouds.forEach((c, i) => { c.position.x += 0.006 * (i % 2 === 0 ? 1 : -1); });

  // Float & spin gems
  gemMeshes.forEach(g => {
    if (g.userData.collected) return;
    g.position.y = g.userData.baseY + Math.sin(t * 1.4 + g.userData.phase) * 0.55;
    g.rotation.y = t * 1.3 + g.userData.phase;
  });

  // Player movement (only when locked and game not won)
  if (locked && !gameWon) {
    if (!startTime) startTime = Date.now();

    const sprint = keys['ShiftLeft'] || keys['ShiftRight'];
    const speed  = MOVE_SPEED * (sprint ? SPRINT_MULT : 1) * dt;

    let dx = 0, dz = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    { dx += Math.sin(player.yaw);  dz -= Math.cos(player.yaw); }
    if (keys['KeyS'] || keys['ArrowDown'])  { dx -= Math.sin(player.yaw);  dz += Math.cos(player.yaw); }
    if (keys['KeyA'] || keys['ArrowLeft'])  { dx -= Math.cos(player.yaw);  dz -= Math.sin(player.yaw); }
    if (keys['KeyD'] || keys['ArrowRight']) { dx += Math.cos(player.yaw);  dz += Math.sin(player.yaw); }

    // Normalize diagonal
    const len = Math.sqrt(dx * dx + dz * dz);
    if (len > 0) { dx /= len; dz /= len; }

    player.x = Math.max(-BOUNDS, Math.min(BOUNDS, player.x + dx * speed));
    player.z = Math.max(-BOUNDS, Math.min(BOUNDS, player.z + dz * speed));

    // Gem proximity collection
    gemMeshes.forEach(gem => {
      if (gem.userData.collected) return;
      const dist = Math.hypot(gem.position.x - player.x, gem.position.z - player.z);
      if (dist < COLLECT_DIST) collectGem(gem);
    });

    // Timer
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }

  // Position camera at eye height above terrain (or above water)
  const groundY = Math.max(terrainHeight(player.x, player.z), -1.5);
  camera.position.set(player.x, groundY + EYE_HEIGHT, player.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
